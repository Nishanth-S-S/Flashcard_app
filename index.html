<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Flashcard flip  */
.card{perspective:1200px}
.inner{transition:.6s;transform-style:preserve-3d}
.flip{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden}
.back{transform:rotateY(180deg)}
</style>
</head>
<!-- body with gradient background and centered content -->
<body class="bg-black min-h-screen text-white p-6">

<button onclick="window.location.href='https://github.com/Nishanth-S-S/Flashcard_app'">GitHub Page</button>

<!-- Create a deck and see all decks -->
<div id="home" class="max-w-3xl mx-auto">
<div class="flex gap-2 mb-6">

<input id="deckInput" class="bg-white/10 p-3 rounded-xl w-full">
<button onclick="add()" class="bg-indigo-500 px-5 rounded-xl">+</button>
</div>

<!-- JavaScript fills this  with clickable deck cards -->
<div id="deckList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
</div>


<!-- Deck page: hidden until the user opens a deck -->
<div id="page" class="hidden max-w-3xl mx-auto">

<div class= "flex gap-2 mb-6">
<button onclick="mode='add';render()" class="bg-green-500 px-3 py-2 rounded-xl">add</button>
<button onclick=  "mode='study';render()" class="bg-blue-500 px-3 py-2 rounded-xl">study</button>
<button onclick="backHome()"  class="bg-white/10 px-3 py-2 rounded-xl">back</button>
</div>

<!-- Add card mode: type term and deffiniton -->
<div id="addBox" class="hidden bg-white/10 p-5 rounded-2xl">
<input id="term" placeholder="term" class="w-full mb-2 p-3 rounded-lg bg-black/20">
<input id="def" placeholder="definition" class="w-full mb-3 p-3 rounded-lg bg-black/20">
<button onclick="saveCard()" class="bg-green-500 px-4 py-2 rounded-lg w-full">add</button>
</div>

<!-- Study mode: click the card to flip, use buttons to move through cards -->
<div id="studyBox" class="hidden flex flex-col items-center">

<div class="card w-full h-64" onclick="flipCard()">
<div id="innerCard" class="inner w-full h-full relative">
<div class="front bg-white text-black flex items-center justify-center rounded-2xl text-xl font-semibold"></div>
<div class="back bg-gray-200 text-black flex items-center justify-center rounded-2xl text-xl font-semibold"></div>
</div>
</div>

<div class="flex gap-3 mt-4 w-full">
<button onclick="prevCard()" class="bg-white/10 px-4 py-2 rounded-xl w-1/2">back</button>
<button onclick="nextCard()" class="bg-white/10 px-4 py-2 rounded-xl w-1/2">next</button>
</div>

</div>

</div>


<script>

// Main app data
let decks = {}
let currentDeck = null
let index = 0
let mode = 'add'


// Make a new deck
function add(){
 let name = deckInput.value
 if(!name) return

 if(!decks[name]) decks[name] = []
 draw()
}


// Show all decks on the home page
function draw(){
 let box = document.getElementById("deckList")
 box.innerHTML=""

 for(let d in decks){

  let el = document.createElement("div")
  el.className="bg-white/10 p-6 rounded-2xl cursor-pointer text-center"

  el.innerText = d

  el.onclick = function(){
   openDeck(d)
  }

  box.appendChild(el)
 }
}


// Open the deck page
function openDeck(name){
 currentDeck = name
 index = 0

 home.classList.add("hidden")
 page.classList.remove("hidden")

 render()
}


// Go back to home
function backHome(){
 page.classList.add("hidden")
 home.classList.remove("hidden")
}


// Switch between add and study
function render(){

 addBox.classList.add("hidden")
 studyBox.classList.add("hidden")

 if(mode=="add"){
  addBox.classList.remove("hidden")
 }

 if(mode=="study"){
  studyBox.classList.remove("hidden")
  showCard()
 }
}


// Add a card to the deck
function saveCard(){

 if(!term.value || !def.value) return

 decks[currentDeck].push({
  q: term.value,
  a: def.value
 })

 term.value=""
 def.value=""
}


// Show the current card
function showCard(){

 if(!decks[currentDeck]) return
 if(!decks[currentDeck][index]) return

 let card = decks[currentDeck][index]

 document.querySelector("#innerCard .front").innerText = card.q
 document.querySelector("#innerCard .back").innerText = card.a
}


// Flip the card
function flipCard(){
 innerCard.classList.toggle("flip")
}


// Go to the next card
function nextCard(){

 index++

 if(index >= decks[currentDeck].length){
  index = 0
 }

 innerCard.classList.remove("flip")
 showCard()
}


// Go to the previous card
function prevCard(){

 index--

 if(index < 0){
  index = decks[currentDeck].length - 1
 }

 innerCard.classList.remove("flip")
 showCard()
}

</script>

</body>
</html>
