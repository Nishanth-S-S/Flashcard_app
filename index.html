<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Flashcard App Scaffold</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 800px;
      margin: 0 auto 20px auto;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
    }

    input, button, select {
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #cardBox {
      margin-top: 20px;
      background: white;
      color: black;
      min-height: 180px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      text-align: center;
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    #results {
      margin-top: 10px;
      color: #bdbdbd;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Flashcard App</h1>

    <div class="row">
      <input id="deckInput" placeholder="Enter deck name">
      <button onclick="addDeck()">Add Deck</button>
    </div>

    <div class="row">
      <select id="deckSelect"></select>
      <button onclick="selectDeck()">Open Deck</button>
    </div>
  </div>

  <div class="box">
    <h2>Add Card</h2>

    <input id="termInput" placeholder="Term" style="width: 100%;">
    <input id="defInput" placeholder="Definition" style="width: 100%;">
    <button onclick="addCard()">Save Card</button>
  </div>

  <div class="box">
    <h2>Study</h2>

    <div class="row">
      <button onclick="previousCard()">Previous</button>
      <button onclick="flipCard()">Flip</button>
      <button onclick="nextCard()">Next</button>
    </div>

    <div id="cardBox">No card selected yet</div>
  </div>

  <div class="box">
    <h2>Search</h2>

    <input id="searchInput" placeholder="Search cards" style="width: 100%;" oninput="updateMatchDisplay()">
    <div id="results">Matching cards: 0</div>
  </div>

  <script>
    /*
      DATA SETUP
      You can keep all cards in one list.
      Each card is an object with:
      - deck
      - term
      - definition
    */

    let decks = [];
    let cards = [];

    let currentDeck = "";
    let currentIndex = 0;
    let showingFront = true;

    function addDeck() {
      let name = document.getElementById("deckInput").value.trim();

      // 1. Check if the deck name is blank
      if (name === "") {
        return;
      }

      // 2. Check if the deck already exists
      if (decks.includes(name)) {
        return;
      }

      // 3. If valid, add it to decks
      decks.push(name);

      // 4. Clear the input
      document.getElementById("deckInput").value = "";

      // 5. Call drawDeckOptions()
      drawDeckOptions();
    }

    function drawDeckOptions() {
      let select = document.getElementById("deckSelect");
      select.innerHTML = "";

      // Loop through decks
      // Create an <option> for each deck
      // Add each option to the select menu
      for (let i = 0; i < decks.length; i++) {
        let option = document.createElement("option");
        option.value = decks[i];
        option.textContent = decks[i];
        select.appendChild(option);
      }
    }

    function selectDeck() {
      currentDeck = document.getElementById("deckSelect").value;
      currentIndex = 0;
      showingFront = true;

      showCurrentCard();
      updateMatchDisplay();
    }

    function addCard() {
      let term = document.getElementById("termInput").value.trim();
      let definition = document.getElementById("defInput").value.trim();

      // 1. Make sure a deck is selected
      if (currentDeck === "") {
        return;
      }

      // 2. Make sure term and definition are not blank
      if (term === "" || definition === "") {
        return;
      }

      // 3. Add a new card object to cards
      cards.push({
        deck: currentDeck,
        term: term,
        definition: definition
      });

      // 4. Clear inputs
      document.getElementById("termInput").value = "";
      document.getElementById("defInput").value = "";

      // 5. Update screen
      currentIndex = getCardsInCurrentDeck().length - 1;
      showingFront = true;
      showCurrentCard();
      updateMatchDisplay();
    }

    function getCardsInCurrentDeck() {
      let deckCards = [];

      // Loop through cards
      // If card.deck matches currentDeck, add that card to deckCards
      for (let i = 0; i < cards.length; i++) {
        if (cards[i].deck === currentDeck) {
          deckCards.push(cards[i]);
        }
      }

      return deckCards;
    }

    function showCurrentCard() {
      let deckCards = getCardsInCurrentDeck();
      let cardBox = document.getElementById("cardBox");

      if (currentDeck === "") {
        cardBox.innerText = "Select a deck first";
        return;
      }

      if (deckCards.length === 0) {
        cardBox.innerText = "No cards in this deck";
        return;
      }

      let currentCard = deckCards[currentIndex];

      if (showingFront) {
        // show the term
        cardBox.innerText = currentCard.term;
      } else {
        // show the definition
        cardBox.innerText = currentCard.definition;
      }
    }

    function flipCard() {
      let deckCards = getCardsInCurrentDeck();

      if (deckCards.length === 0) {
        return;
      }

      // Switch showingFront from true to false or false to true
      // Then call showCurrentCard()
      showingFront = !showingFront;
      showCurrentCard();
    }

    function nextCard() {
      let deckCards = getCardsInCurrentDeck();

      if (deckCards.length === 0) {
        return;
      }

      // 1. Increase currentIndex by 1
      currentIndex++;

      // 2. If currentIndex goes past the end, wrap to 0
      if (currentIndex >= deckCards.length) {
        currentIndex = 0;
      }

      // 3. Set showingFront to true
      showingFront = true;

      // 4. Show the card
      showCurrentCard();
    }

    function previousCard() {
      let deckCards = getCardsInCurrentDeck();

      if (deckCards.length === 0) {
        return;
      }

      // 1. Decrease currentIndex by 1
      currentIndex--;

      // 2. If currentIndex goes below 0, wrap to last card
      if (currentIndex < 0) {
        currentIndex = deckCards.length - 1;
      }

      // 3. Set showingFront to true
      showingFront = true;

      // 4. Show the card
      showCurrentCard();
    }

    /*
      IMPORTANT PROCEDURE
      This is the one you should make strong.

      It should:
      - take a parameter
      - use the list of cards
      - use iteration
      - use selection
      - return a result
    */
    function countMatches(searchText) {
      let matches = 0;
      let deckCards = getCardsInCurrentDeck();
      let loweredSearch = searchText.toLowerCase();

      // Loop through deckCards
      // For each card:
      //   get the lowercase term
      //   get the lowercase definition
      //
      // If:
      //   loweredSearch is empty
      //   OR term includes loweredSearch
      //   OR definition includes loweredSearch
      //
      // then increase matches
      for (let i = 0; i < deckCards.length; i++) {
        let loweredTerm = deckCards[i].term.toLowerCase();
        let loweredDefinition = deckCards[i].definition.toLowerCase();

        if (
          loweredSearch === "" ||
          loweredTerm.includes(loweredSearch) ||
          loweredDefinition.includes(loweredSearch)
        ) {
          matches++;
        }
      }

      return matches;
    }

    function updateMatchDisplay() {
      let text = document.getElementById("searchInput").value;
      let result = countMatches(text);

      document.getElementById("results").innerText =
        "Matching cards: " + result;
    }

    // Start the app
    drawDeckOptions();
  </script>
</body>
</html>
